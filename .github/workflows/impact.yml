name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.github/**', 'LICENSE', 'CHANGELOG.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', '.github/**', 'LICENSE', 'CHANGELOG.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e .
      - name: Run tests
        run: |
          python -m unittest discover tests -v
