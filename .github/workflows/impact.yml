name: Run impact analysis

on:
  push:
  pull_request:

jobs:
  impact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run impact analysis
        shell: bash
        run: |
          impact-engine diff --json > result.json
          echo "=== RAW OUTPUT ==="
          cat result.json

          MAX_RISK=$(python -c "import json; print(json.load(open('result.json'))['max_risk'])")
          echo "Max Risk: $MAX_RISK"

          THRESHOLD=5
          if [ "$MAX_RISK" -gt "$THRESHOLD" ]; then
            echo "❌ CI failed: risk too high"
            exit 1
          fi

          echo "✅ CI passed"
