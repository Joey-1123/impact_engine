name: Run Impact Analysis

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.github/**', 'LICENSE', 'CHANGELOG.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', '.github/**', 'LICENSE', 'CHANGELOG.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  impact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run impact analysis
        id: analysis
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
            impact-engine compare --base "$BASE_REF" --head "$HEAD_REF" --json > result.json
          else
            BASE_REF="${{ github.event.before }}"
            if [ -n "$BASE_REF" ] && [ "$BASE_REF" != "0000000000000000000000000000000000000000" ]; then
              impact-engine diff --json --base "$BASE_REF" > result.json
            else
              impact-engine diff --json > result.json
            fi
          fi
          echo "=== RAW OUTPUT ==="
          cat result.json

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MAX_RISK=$(python -c "
import json
d = json.load(open('result.json'))
risks = list(d.get('new_risks', {}).values()) + list(d.get('still_risks', {}).values())
print(max(risks) if risks else 0)
")
          else
            MAX_RISK=$(python -c "import json; print(json.load(open('result.json'))['max_risk'])")
          fi
          echo "max_risk=$MAX_RISK" >> $GITHUB_OUTPUT

          THRESHOLD=5
          if [ "$MAX_RISK" -gt "$THRESHOLD" ]; then
            echo " CI failed: risk too high"
            echo "risk_status=failure" >> $GITHUB_OUTPUT
          else
            echo " CI passed"
            echo "risk_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: impact-result
          path: result.json

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            let data;
            try {
              data = JSON.parse(fs.readFileSync('result.json', 'utf8'));
            } catch {
              data = null;
            }

            let body = '';
            const status = '${{ steps.analysis.outputs.risk_status }}';

            if (status === 'failure') {
              body += '## ❌ Impact Analysis Failed\n\n';
            } else {
              body += '## ✅ Impact Analysis Passed\n\n';
            }

            if (!data) {
              body += 'Could not parse analysis results.';
            } else if (data.summary) {
              body += `**Base:** \`${data.base_ref}\` → **Head:** \`${data.head_ref}\`\n`;
              body += `**Merge base:** \`${data.merge_base}\`\n\n`;
              const s = data.summary;
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| New changes | ${s.new_changes} |\n`;
              body += `| Resolved | ${s.resolved} |\n`;
              body += `| Still changed | ${s.still_changed} |\n`;
              body += `| Total on base | ${s.total_on_base} |\n`;
              body += `| Total on head | ${s.total_on_head} |\n`;
              body += `| **Risk delta** | **${data.risk_delta > 0 ? '+' : ''}${data.risk_delta}** |\n`;

              if (data.new_changes && data.new_changes.length > 0) {
                body += `\n**New functions (${data.new_changes.length}):**\n`;
                data.new_changes.slice(0, 10).forEach(f => body += `- \`${f}\`\n`);
                if (data.new_changes.length > 10) body += `- _...${data.new_changes.length - 10} more_\n`;
              }
              if (data.new_risks && Object.keys(data.new_risks).length > 0) {
                body += `\n**Highest new risks:**\n`;
                Object.entries(data.new_risks).slice(0, 5).forEach(([k, v]) => body += `- \`${k}\` (risk=${v})\n`);
              }
            } else if (data.max_risk !== undefined) {
              body += `**Max Risk:** ${data.max_risk}\n\n`;
              if (!data.files || data.files.length === 0) {
                body += `No impacted functions.`;
              } else {
                body += `**Changed Files:**\n`;
                data.files.forEach(f => {
                  body += `\n\`${f.file}\`:\n`;
                  f.functions.forEach(fn => {
                    body += `  - ${fn.name} (risk=${fn.risk})\n`;
                  });
                });
              }
            }

            // Find existing comment to update
            const {data: comments} = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Impact Analysis')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

            // Add labels based on risk
            const maxRisk = data ? (data.max_risk || 0) : 0;
            const labels = ['impact-checked'];
            if (maxRisk >= 5) labels.push('risk:high');
            else if (maxRisk >= 2) labels.push('risk:medium');
            else labels.push('risk:low');

            if (status === 'failure') labels.push('needs-review');

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });
