name: Run impact analysis

on:
  push:
  pull_request:

jobs:
  impact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run impact analysis
        shell: bash
        run: |
          impact-engine diff --json > result.json
          echo "=== RAW OUTPUT ==="
          cat result.json

          MAX_RISK=$(python -c "import json; print(json.load(open('result.json'))['max_risk'])")
          echo "Max Risk: $MAX_RISK"

          THRESHOLD=5
          if [ "$MAX_RISK" -gt "$THRESHOLD" ]; then
            echo " CI failed: risk too high"
            exit 1
          fi

          echo " CI passed"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const data = JSON.parse(fs.readFileSync('result.json', 'utf8'));

            let body = ` Impact Report\n\n`;
            body += `Max Risk: ${data.max_risk}\n\n`;

            if (!data.functions || data.functions.length === 0) {
              body += `No impacted functions `;
            } else {
              body += `Changed Functions:\n`;
              data.functions.forEach(f => {
                body += `- ${f.function} (risk=${f.risk})\n`;
              });
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
