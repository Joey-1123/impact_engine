<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <g transform="translate(60, 60)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="60" x2="1080" y2="60" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="120" x2="1080" y2="120" stroke="#ffffff08" stroke-width="1"/>
    <line x1="0" y1="180" x2="1080" y2="180" stroke="#ffffff08" stroke-width="1"/>
    <!-- Logo icon -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="30" cy="30" r="12" fill="url(#accent)" opacity="0.3"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">IE</text>
    <!-- Title -->
    <text x="68" y="36" fill="white" font-family="system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Impact Engine</text>
    <!-- Tagline -->
    <text x="0" y="80" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" font-weight="400">Codebase intelligence platform · Dependency analysis · Health scoring · Knowledge graphs</text>
    <!-- Metrics row -->
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="340" height="80" rx="8" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
      <text x="20" y="28" fill="#6366f1" font-family="monospace" font-size="20" font-weight="700">—</text>
      <text x="20" y="50" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">Health biomarkers</text>
      <text x="20" y="66" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Deterministic · Zero LLM · <30s</text>
    </g>
    <g transform="translate(370, 120)">
      <rect x="0" y="0" width="340" height="80" rx="8" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
      <text x="20" y="28" fill="#22d3ee" font-family="monospace" font-size="20" font-weight="700">15</text>
      <text x="20" y="50" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">Languages supported</text>
      <text x="20" y="66" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Python · JS/TS · Rust · Go · Java + more</text>
    </g>
    <g transform="translate(740, 120)">
      <rect x="0" y="0" width="340" height="80" rx="8" fill="#ffffff06" stroke="#ffffff10" stroke-width="1"/>
      <text x="20" y="28" fill="#a855f7" font-family="monospace" font-size="20" font-weight="700">9</text>
      <text x="20" y="50" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">MCP tools</text>
      <text x="20" y="66" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">For AI coding agents · REST API · Web UI</text>
    </g>
  </g>
</svg>
